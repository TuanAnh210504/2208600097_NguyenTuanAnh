name: CI/CD Pipeline

on:
  push:
    branches: ["deploy"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # 1. Giai đoạn Build
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Building the project
        run: |
          echo "Building the project..."
          echo "Build completed at: $(date)"
      # Lưu lại thư mục public để dùng cho các bước sau
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: public/
          retention-days: 1

  # 2. Giai đoạn Test
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: public/
      - name: Running tests
        run: |
          echo "Running tests..."
          echo "Checking HTML syntax..."
          test -f public/index.html && echo "index.html exists" || exit 1
          # Lưu ý: Anh hãy kiểm tra xem file styles.css và main.js có thực sự nằm ở các đường dẫn này không nhé
          test -f public/styles.css && echo "styles.css exists" || exit 1

  # 3. Giai đoạn Deploy
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: public/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
      - uses: actions/deploy-pages@v4