name: CI/CD Pipeline

on:
  # 1. Chỉ chạy CI khi có Pull Request vào nhánh main
  pull_request:
    branches: ["main"]

  # 2. Cho phép bấm nút chạy thủ công (Manual Trigger)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # GIAI ĐOẠN 1 & 2: BUILD & TEST (Chạy tự động khi có Pull Request)
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Building the project
        run: |
          echo "Building the project..."
          mkdir -p public
          touch public/index.html public/styles.css 
          
      - name: Running tests
        run: |
          echo "Running tests..."
          test -f public/index.html && echo "index.html exists" || exit 1
          test -f public/styles.css && echo "styles.css exists" || exit 1

      # Lưu Artifact để Stage Deploy có thể dùng
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: public/
          retention-days: 1

  # GIAI ĐOẠN 3: DEPLOY (Chỉ chạy thủ công khi bấm nút)
  deploy:
    # Điều kiện: Chỉ chạy khi người dùng bấm nút "Run workflow" 
    # VÀ chỉ chạy trên nhánh main (để đảm bảo an toàn)
    if: github.event_name == 'workflow_dispatch'
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: public/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
      - id: deployment
        uses: actions/deploy-pages@v4
